name: BAWDYHAUZ CI

on:
  pull_request:
  push:
    branches:
      - main
      - staging

jobs:
  checks:
    name: Typecheck and Expo health
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Expo dependency check
        run: npx expo install --check

      - name: Expo doctor
        run: npx expo-doctor
